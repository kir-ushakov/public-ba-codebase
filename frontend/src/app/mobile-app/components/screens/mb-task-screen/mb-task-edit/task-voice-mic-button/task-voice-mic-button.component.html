<!-- #VIWAI_FE_TRIGGER-BUTTON -->
@if (!(voiceToTextConverting$ | async)) {
  <button
    class="mic-icon-button"
    mat-icon-button
    aria-label="Microphone"
    type="button"
    (click)="onMicClick($event)"
    (mousedown)="preventInputFocus($event)"
    tabindex="-1"
  >
    <mat-icon class="mic-icon" aria-hidden="true">mic</mat-icon>
  </button>
} @else {
  <!-- Mic hidden: show a compact "converting" indicator (dots animate in SCSS) -->
  <span class="dots-suffix" aria-live="polite" aria-label="Converting speech to text">
    <!-- Three dots; staggered @keyframes jump in component styles -->
    <span class="dot"></span><span class="dot"></span><span class="dot"></span>
  </span>
}
