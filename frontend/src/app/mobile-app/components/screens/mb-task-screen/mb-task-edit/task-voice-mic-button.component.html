<button
  class="mic-icon-button"
  mat-icon-button
  aria-label="Microphone"
  type="button"
  (click)="onMicClick($event)"
  (mousedown)="preventInputFocus($event)"
  tabindex="-1"
>
  @if (!(voiceToTextConverting$ | async)) {
    <mat-icon class="mic-icon" aria-hidden="true">mic</mat-icon>
  }
</button>
